<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - BannerFlix</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .admin-container {
      max-width: 1400px;
      margin: 80px auto 40px;
      padding: 0 40px;
    }
    .admin-header {
      margin-bottom: 40px;
    }
    .admin-header h1 {
      font-size: 2rem;
      margin-bottom: 8px;
    }
    .admin-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }
    .stat-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
    }
    .stat-value {
      font-size: 2rem;
      font-weight: 800;
      color: var(--accent2);
      margin-bottom: 8px;
    }
    .stat-label {
      font-size: 0.9rem;
      color: var(--text-muted);
    }
    .users-table {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .table-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .table-header h2 {
      font-size: 1.2rem;
    }
    .search-box {
      display: flex;
      gap: 8px;
    }
    .search-box input {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px 14px;
      color: var(--text);
      font-size: 0.9rem;
      width: 250px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th {
      background: var(--bg3);
      padding: 12px 24px;
      text-align: left;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    td {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      font-size: 0.9rem;
    }
    tr:hover {
      background: var(--bg3);
    }
    .plano-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
    }
    .plano-teste { background: rgba(107, 114, 128, 0.2); color: #9ca3af; }
    .plano-mensal { background: rgba(124, 58, 237, 0.2); color: #a855f7; }
    .plano-anual { background: rgba(37, 99, 235, 0.2); color: #60a5fa; }
    .plano-vitalicio { background: rgba(234, 179, 8, 0.2); color: #fbbf24; }
    .btn-action {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 6px 14px;
      border-radius: var(--radius-sm);
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-right: 6px;
    }
    .btn-action:hover {
      background: var(--accent2);
    }
    .btn-danger {
      background: #dc2626;
    }
    .btn-danger:hover {
      background: #991b1b;
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-logo">🎬 Banner<span>Flix</span> <span style="font-size:0.7rem;opacity:0.6;">Admin</span></div>
    <div class="nav-right">
      <a href="index.html" class="btn-nav-outline">← Voltar ao Site</a>
      <button class="btn-nav-outline" onclick="fazerLogout()">Sair</button>
    </div>
  </nav>

  <div class="admin-container">
    <div class="admin-header">
      <h1>Painel Administrativo</h1>
      <p style="color:var(--text-muted);">Gerencie usuários e planos</p>
    </div>

    <!-- ESTATÍSTICAS -->
    <div class="admin-stats">
      <div class="stat-card">
        <div class="stat-value" id="totalUsuarios">0</div>
        <div class="stat-label">Total de Usuários</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="usuariosTeste">0</div>
        <div class="stat-label">Plano Teste</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="usuariosMensal">0</div>
        <div class="stat-label">Plano Mensal</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="usuariosAnual">0</div>
        <div class="stat-label">Plano Anual</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="usuariosVitalicio">0</div>
        <div class="stat-label">Plano Vitalício</div>
      </div>
    </div>

    <!-- TABELA DE USUÁRIOS -->
    <div class="users-table">
      <div class="table-header">
        <h2>Usuários</h2>
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="Buscar por email..." onkeyup="filtrarUsuarios()" />
        </div>
      </div>
      <table>
        <thead>
          <tr>
            <th>Email</th>
            <th>Nome</th>
            <th>Plano</th>
            <th>Créditos</th>
            <th>Expira em</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="usuariosTableBody">
          <tr>
            <td colspan="6" style="text-align:center;padding:40px;color:var(--text-muted);">
              Carregando usuários...
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- MODAL EDITAR USUÁRIO -->
  <div class="modal-overlay" id="modalEditarUsuario" onclick="fecharModalFora(event)">
    <div class="modal-box">
      <button class="modal-close" onclick="fecharModal()">✕</button>
      <h2 class="modal-title">Editar Usuário</h2>
      
      <div class="form-group">
        <label>Email</label>
        <input type="text" id="editEmail" disabled style="opacity:0.6;" />
      </div>

      <div class="form-group">
        <label>Plano</label>
        <select id="editPlano" style="width:100%;padding:10px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);">
          <option value="teste">Teste (5 créditos)</option>
          <option value="mensal">Mensal (Ilimitado - 30 dias)</option>
          <option value="anual">Anual (Ilimitado - 365 dias)</option>
          <option value="vitalicio">Vitalício (Ilimitado)</option>
        </select>
      </div>

      <div class="form-group">
        <label>Créditos (apenas para plano Teste)</label>
        <input type="number" id="editCreditos" min="0" />
      </div>

      <button class="btn-auth" onclick="salvarEdicaoUsuario()">💾 Salvar Alterações</button>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast" class="toast"></div>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-auth.js"></script>
  <script src="admin-supabase.js"></script>

</body>
</html>
